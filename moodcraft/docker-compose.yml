version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cerebro-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: cerebro
      POSTGRES_PASSWORD: cerebro_dev_password
      POSTGRES_DB: cerebro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cerebro']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cerebro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nlp-service:
    build:
      context: ./apps/nlp-service
      dockerfile: Dockerfile
    container_name: cerebro-nlp
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      # App Configuration
      - DEBUG=${DEBUG:-false}
      - API_PREFIX=/api/v1
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      # Anthropic (Optional)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Vector Database - Pinecone
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-us-east-1}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-cerebro-memory}
      # Vector Database - Qdrant (Self-hosted)
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      # Database & Redis
      - DATABASE_URL=postgresql://cerebro:cerebro_dev_password@postgres:5432/cerebro
      - REDIS_URL=redis://redis:6379
      # LangSmith (Observability)
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-cerebro-ai}
      # Security
      - API_SECRET_KEY=${API_SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=["http://localhost:3000","http://web:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Self-hosted Qdrant for vector storage
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerebro-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
