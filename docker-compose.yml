services:
  # ─── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: xappy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./envs/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xappy -d xappy_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xappy

  cerebro-postgres:
    image: postgres:16-alpine
    container_name: xappy-cerebro-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - ./envs/cerebro-postgres.env
    volumes:
      - cerebro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerebro -d cerebro"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xappy

  redis:
    image: redis:7-alpine
    container_name: xappy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xappy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: xappy-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - xappy

  # ─── XappyIO (main website) ─────────────────────────────────────

  xappy-web:
    build:
      context: ./XappyIO
      dockerfile: Dockerfile
    image: xappy-web:dev
    container_name: xappy-web
    restart: unless-stopped
    ports:
      - "5051:3000"
    volumes:
      - ./XappyIO:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./envs/xappy-web.env
    command: npm run dev
    networks:
      - xappy

  # ─── Xappy Health ───────────────────────────────────────────────

  health-api:
    build:
      context: ./Xappy-Health/backend
      dockerfile: Dockerfile
    image: xappy-health-api:dev
    container_name: xappy-health-api
    restart: unless-stopped
    ports:
      - "5056:8000"
    volumes:
      - ./Xappy-Health/backend:/app
      - ./Xappy-Health/uploads:/app/uploads
    env_file:
      - ./envs/shared.env
      - ./envs/health-api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - xappy

  health-web:
    build:
      context: ./Xappy-Health/frontend
      dockerfile: Dockerfile
    image: xappy-health-web:dev
    container_name: xappy-health-web
    restart: unless-stopped
    ports:
      - "5053:3000"
    volumes:
      - ./Xappy-Health/frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./envs/health-web.env
    depends_on:
      health-api:
        condition: service_healthy
    command: npm run dev
    networks:
      - xappy

  # ─── Xappy Oil ──────────────────────────────────────────────────

  oil-api:
    build:
      context: ./Xappy-Oil/backend
      dockerfile: Dockerfile
    image: xappy-oil-api:dev
    container_name: xappy-oil-api
    restart: unless-stopped
    ports:
      - "5054:8000"
    volumes:
      - ./Xappy-Oil/backend:/app
      - ./Xappy-Oil/uploads:/app/uploads
    env_file:
      - ./envs/shared.env
      - ./envs/oil-api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - xappy

  oil-web:
    build:
      context: ./Xappy-Oil/frontend
      dockerfile: Dockerfile
    image: xappy-oil-web:dev
    container_name: xappy-oil-web
    restart: unless-stopped
    ports:
      - "5052:9000"
    volumes:
      - ./Xappy-Oil/frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./envs/oil-web.env
    depends_on:
      oil-api:
        condition: service_healthy
    command: npm run dev
    networks:
      - xappy

  # ─── Xappy Property ────────────────────────────────────────────

  property-api:
    build:
      context: ./Xappy-Property/backend
      dockerfile: Dockerfile
    image: xappy-property-api:dev
    container_name: xappy-property-api
    restart: unless-stopped
    ports:
      - "5058:8000"
    volumes:
      - ./Xappy-Property/backend:/app
      - ./Xappy-Property/uploads:/app/uploads
    env_file:
      - ./envs/shared.env
      - ./envs/property-api.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - xappy

  property-web:
    build:
      context: ./Xappy-Property/frontend
      dockerfile: Dockerfile
    image: xappy-property-web:dev
    container_name: xappy-property-web
    restart: unless-stopped
    ports:
      - "5057:3000"
    volumes:
      - ./Xappy-Property/frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./envs/property-web.env
    depends_on:
      property-api:
        condition: service_healthy
    command: npm run dev
    networks:
      - xappy

  # ─── Moodcraft (CereBro) ───────────────────────────────────────

  moodcraft-api:
    build:
      context: ./moodcraft/apps/nlp-service
      dockerfile: Dockerfile
    image: xappy-moodcraft-api:dev
    container_name: xappy-moodcraft-api
    restart: unless-stopped
    ports:
      - "5161:8000"
    env_file:
      - ./envs/shared.env
      - ./envs/moodcraft-api.env
    depends_on:
      cerebro-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - xappy

  moodcraft-web:
    build:
      context: ./moodcraft/apps/web
      dockerfile: Dockerfile
    image: xappy-moodcraft-web:dev
    container_name: xappy-moodcraft-web
    restart: unless-stopped
    ports:
      - "5160:3000"
    volumes:
      - ./moodcraft/apps/web:/app
      - /app/node_modules
      - /app/.next
      - /app/.prisma
    env_file:
      - ./envs/shared.env
      - ./envs/moodcraft-web.env
    depends_on:
      cerebro-postgres:
        condition: service_healthy
      moodcraft-api:
        condition: service_healthy
    command: npm run dev
    networks:
      - xappy

volumes:
  postgres_data:
  cerebro_postgres_data:
  redis_data:
  qdrant_data:

networks:
  xappy:
    driver: bridge
