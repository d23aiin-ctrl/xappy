version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: xappy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: xappy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xappy_secret_2024}
      POSTGRES_DB: xappy_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xappy -d xappy_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xappy_network

  redis:
    image: redis:7-alpine
    container_name: xappy_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xappy_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xappy_backend
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://xappy:${POSTGRES_PASSWORD:-xappy_secret_2024}@db:5432/xappy_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-xappy-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-xappy_verify_token}
      - BHASHINI_API_KEY=${BHASHINI_API_KEY}
      - BHASHINI_USER_ID=${BHASHINI_USER_ID}
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - xappy_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xappy_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    networks:
      - xappy_network

volumes:
  postgres_data:
  redis_data:

networks:
  xappy_network:
    driver: bridge
